<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form </title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    margin:0;
    padding:0;
}

.container{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input[type="text"],
input[type="email"],
input[type="number"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

.options{
    margin-top:8px;
}

.options label{
    font-weight:normal;
    display:block;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    background:#2575fc;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1a5ad7;
}

</style>
</head>

<body>

<div class="container">

<h1>Survey Form By College</h1>

<form>

<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter your email">

<label for="age">Age</label>
<input type="number" id="age" placeholder="Enter your age">

<label>Would you recommend this survey form to a friend?</label>
<div class="options">
<label><input type="radio" name="recommend"> Yes</label>
<label><input type="radio" name="recommend"> Maybe</label>
<label><input type="radio" name="recommend"> No</label>
</div>

<label>Languages Known</label>
<div class="options">
<label><input type="checkbox"> HTML</label>
<label><input type="checkbox"> CSS</label>
<label><input type="checkbox"> JavaScript</label>
<label><input type="checkbox"> Python</label>
<label><input type="checkbox"> Java</label>
</div>

<label>Frameworks Known</label>
<div class="options">
<label><input type="checkbox"> React</label>
<label><input type="checkbox"> Angular</label>
<label><input type="checkbox"> Hibernate</label>
<label><input type="checkbox"> SpringBoot</label>
</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
